[profile.default]
src = "src"
out = "out"
test = "test"
libs = ["node_modules", "lib"]
solc_version = "0.8.34"
optimizer = true
optimizer_runs = 200
via_ir = true

dotenv = ".env"

[rpc_endpoints]
mainnet = "${ETH_RPC_URL}"
arbitrum = "${ARBITRUM_RPC_URL}"
base = "${BASE_RPC_URL}"
bnb = "${BNB_RPC_URL}"
